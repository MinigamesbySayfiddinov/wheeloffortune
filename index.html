<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Колесо Удачи (Fixed Rigged)</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        #wheel-container { position: relative; margin: 20px; }
        #pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
            border-top: 30px solid #ff4d4d; z-index: 10;
        }
        canvas { border-radius: 50%; border: 5px solid #16213e; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .controls { width: 100%; max-width: 400px; text-align: center; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; background: #0f3460; color: white; border: 1px solid #533483; padding: 10px; }
        button { width: 100%; padding: 15px; font-size: 18px; cursor: pointer; background: #e94560; color: white; border: none; border-radius: 5px; }
        #winner-display { margin: 15px; font-size: 24px; color: #00ffcc; font-weight: bold; min-height: 30px; }
    </style>
</head>
<body>

    <div id="winner-display">Готов к игре</div>

    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <textarea id="namesInput"></textarea>
        <button onclick="spin()">Крутить!</button>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        const winnerDisplay = document.getElementById('winner-display');

        // --- СПИСОК ЖУЛЬНИЧЕСТВА ---
        const riggedWinners = [
            "Abdukarimova Guzal", 
            "Ismoilov Shoxruh",
            "Gizatullin Rustam"
        ];

        let participants = [];
        let currentAngle = 0; 
        let isSpinning = false;

        function getParticipants() {
            return namesInput.value.split('\n').map(s => s.trim()).filter(s => s !== "");
        }

        function drawWheel(angle) {
            participants = getParticipants();
            const size = participants.length;
            const center = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (size === 0) return;

            const arcSize = (2 * Math.PI) / size;

            participants.forEach((name, i) => {
                const segAngle = i * arcSize + angle;
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? "#533483" : "#e94560";
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, segAngle, segAngle + arcSize);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(segAngle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "16px Arial";
                ctx.fillText(name.substring(0, 15), center - 20, 5);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning) return;
            participants = getParticipants();
            if (participants.length === 0) return;

            isSpinning = true;
            winnerDisplay.innerText = "Крутим...";

            // 1. Выбираем победителя (жульничество)
            let winnerIndex = -1;
            for (let rigged of riggedWinners) {
                let foundIdx = participants.findIndex(p => p.toLowerCase() === rigged.toLowerCase());
                if (foundIdx !== -1) {
                    winnerIndex = foundIdx;
                    break;
                }
            }
            if (winnerIndex === -1) winnerIndex = Math.floor(Math.random() * participants.length);

            // 2. Расчет углов
            const sectorSize = (2 * Math.PI) / participants.length;
            
            // Текущий угол в пределах одного круга
            const startAngle = currentAngle % (Math.PI * 2);
            
            // Вычисляем, на какой угол нужно довернуть, чтобы сектор winnerIndex оказался наверху.
            // Стрелка находится на -PI/2 (90 градусов вверх).
            // Формула: (Нужная позиция) - (Текущая позиция сектора)
            const targetPos = -Math.PI / 2 - (sectorSize / 2);
            const currentPos = startAngle + (winnerIndex * sectorSize);
            let distance = targetPos - currentPos;

            // Чтобы всегда крутилось вперед (по часовой стрелке)
            while (distance < 0) distance += Math.PI * 2;
            
            // Добавляем 5-8 полных кругов для красоты
            const totalRotation = distance + (Math.PI * 2 * 6);
            
            const duration = 4000;
            const startTime = performance.now();

            function animate(now) {
                let elapsed = now - startTime;
                let t = Math.min(elapsed / duration, 1);
                
                // Функция замедления
                let easeOut = 1 - Math.pow(1 - t, 3);
                
                let frameAngle = startAngle + (totalRotation * easeOut);
                drawWheel(frameAngle);

                if (t < 1) {
                    requestAnimationFrame(animate);
                } else {
                    currentAngle = frameAngle;
                    isSpinning = false;
                    const winnerText = participants[winnerIndex];
                    winnerDisplay.innerText = "🎉 Выпал: " + winnerText;

                    setTimeout(() => {
                        // Удаляем именно того, кто реально выиграл
                        let currentList = getParticipants();
                        currentList.splice(winnerIndex, 1);
                        namesInput.value = currentList.join('\n');
                        drawWheel(currentAngle); 
                    }, 1000);
                }
            }
            requestAnimationFrame(animate);
        }

        // Следим за изменениями текста
        namesInput.addEventListener('input', () => drawWheel(currentAngle));
        // Инициализация
        drawWheel(currentAngle);
    </script>
</body>
</html>
